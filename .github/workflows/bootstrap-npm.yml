name: Bootstrap npm release

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact 40-character main-branch commit approved for 0.1.0
        required: true
        type: string
      confirmation:
        description: Type publish-0.1.0-to-next
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-bootstrap-0.1.0
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish 0.1.0 to next
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: npm-production
    steps:
      - name: Verify dispatch intent
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Bootstrap publication must be dispatched from main."
            exit 1
          fi
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_sha must be a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$GITHUB_SHA" != "$EXPECTED_SHA" ]]; then
            echo "::error::Dispatched SHA $GITHUB_SHA does not match approved SHA $EXPECTED_SHA."
            exit 1
          fi
          if [[ "$CONFIRMATION" != "publish-0.1.0-to-next" ]]; then
            echo "::error::Publication confirmation did not match."
            exit 1
          fi

      - name: Check out the approved source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the pinned npm release line
        run: npm install --global npm@11.18.0

      - name: Record tool versions
        run: |
          node --version
          npm --version

      - name: Install exact dependencies
        run: npm ci --strict-allow-scripts

      - name: Run source quality and packaged lifecycle gates
        run: npm run check

      - name: Audit production and development dependencies
        run: npm audit --audit-level=high

      - name: Run the measured performance smoke benchmark
        run: npm run benchmark

      - name: Rehearse the deterministic offline demo twice
        run: |
          npm run demo:offline
          npm run demo:offline

      - name: Install and exercise every packed runtime package
        run: npm run package:smoke

      - name: Require a clean, publishable release candidate
        run: npm run release:preflight

      - name: Verify bootstrap npm identity
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Refuse an existing or ambiguously unavailable version
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          packages=(
            @blackbox/protocol
            @blackbox/storage
            @blackbox/normalizers
            @blackbox/context
            @blackbox/analysis
            @blackbox/daemon
            @blackbox/cli
          )
          for package_name in "${packages[@]}"; do
            set +e
            lookup_output="$(npm view "${package_name}@0.1.0" version --json 2>&1)"
            lookup_status=$?
            set -e
            if [[ $lookup_status -eq 0 ]]; then
              echo "::error::${package_name}@0.1.0 already exists; refusing a bootstrap rerun."
              exit 1
            fi
            if [[ "$lookup_output" != *"E404"* ]]; then
              echo "::error::Could not prove ${package_name}@0.1.0 is absent from npm."
              echo "$lookup_output"
              exit 1
            fi
          done

      - name: Publish dependencies, daemon, and CLI to next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --workspace=@blackbox/protocol --access public --tag next --provenance
          npm publish --workspace=@blackbox/storage --access public --tag next --provenance
          npm publish --workspace=@blackbox/normalizers --access public --tag next --provenance
          npm publish --workspace=@blackbox/context --access public --tag next --provenance
          npm publish --workspace=@blackbox/analysis --access public --tag next --provenance
          npm publish --workspace=@blackbox/daemon --access public --tag next --provenance
          npm publish --workspace=@blackbox/cli --access public --tag next --provenance
