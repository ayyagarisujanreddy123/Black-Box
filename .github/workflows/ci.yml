name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6.0.2
      - name: Use Node.js 22.20
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.20.0
          cache: npm
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  minimum-node:
    name: Minimum Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6.0.2
      - name: Use minimum supported Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  packaged-platform:
    name: Packaged path (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6.0.2
      - name: Use Node.js 22.20
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.20.0
          cache: npm
      - run: npm ci
      - name: Exercise packaged CLI and offline fallback twice
        run: npm run test:e2e
